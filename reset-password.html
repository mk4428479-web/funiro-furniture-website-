<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Montserrat:wght@600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="css/style.css"/><link rel="stylesheet" href="css/responsive.css"/><title>Reset Password — Furniro</title></head><body>
<div id="header-slot"></div>
<section class="auth"><div class="auth-card">
  <h1>Reset password</h1><p class="hint">Choose a new password</p>
  <form id="resetForm" novalidate>
    <div class="field"><label>New password</label><div class="pass-wrap"><input name="password" type="password" required/><button type="button" data-toggle-pass class="toggle">👁</button></div></div>
    <div class="field"><label>Confirm</label><div class="pass-wrap"><input name="confirm" type="password" required/><button type="button" data-toggle-pass class="toggle">👁</button></div></div>
    <button class="btn" type="submit">Update password</button>
  </form>
</div></section>
<script src="js/script.js"></script><script src="js/validation.js"></script><script src="js/auth.js"></script><script src="js/dashboard.js"></script></body></html>
