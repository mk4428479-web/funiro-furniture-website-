<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Montserrat:wght@600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="css/style.css"/><link rel="stylesheet" href="css/responsive.css"/><title>Settings — Furniro</title></head><body>
<div id="header-slot"></div>
<div class="dash" data-dash>
  <aside class="sidebar">
    <div class="u">
      <div class="avatar" data-user-initial>A</div>
      <div class="name" data-user-name>User</div>
      <div class="mail" data-user-mail>user@mail.com</div>
    </div>
    <nav>
      <a href="dashboard.html" class="">🏠 Dashboard</a>
      <a href="profile.html" class="">👤 Profile</a>
      <a href="settings.html" class="active">⚙ Settings</a>
      <a href="cart.html">🛒 My Cart</a>
      <a href="#" data-logout>↪ Logout</a>
    </nav>
  </aside>
  <main class="dash-main">
  <div class="dash-top"><h1>Settings</h1></div>
  <div class="card">
    <h3>Preferences</h3>
    <form id="settingsForm">
      <label style="display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid #eee">Email notifications <input type="checkbox" name="notif"/></label>
      <label style="display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid #eee">Newsletter <input type="checkbox" name="newsletter"/></label>
      <label style="display:flex;justify-content:space-between;padding:12px 0">Dark mode <input type="checkbox" name="dark"/></label>
    </form>
  </div>
  <div class="card">
    <h3>Danger zone</h3>
    <button class="btn" data-logout style="background:var(--danger)">Log out</button>
  </div>
  </main>
</div>
<script src="js/script.js"></script><script src="js/validation.js"></script><script src="js/auth.js"></script><script src="js/dashboard.js"></script></body></html>
