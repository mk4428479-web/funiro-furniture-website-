<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Montserrat:wght@600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="css/style.css"/><link rel="stylesheet" href="css/responsive.css"/><title>Cart — Furniro</title></head><body>
<div id="header-slot"></div>
<section class="banner"><div class="inner">
  <svg class="logo-mark" viewBox="0 0 32 22" fill="currentColor"><path d="M20.7 6.68L16 15.09l-4.7-8.41L16 0l4.7 6.68z"/></svg>
  <h1>Cart</h1>
  <div class="crumb"><a href="index.html">Home</a><span class="sep">></span><span>Cart</span></div>
</div></section>
<section class="section"><div class="container">
  <div class="cart-wrap" data-cart-page>
    <div>
      <table class="cart-table">
        <thead><tr><th>Product</th><th>Price</th><th>Quantity</th><th>Subtotal</th><th></th></tr></thead>
        <tbody data-cart-body></tbody>
      </table>
    </div>
    <aside class="cart-totals">
      <h3>Cart Totals</h3>
      <div class="line"><span>Subtotal</span><span data-cart-sub>Rp 0</span></div>
      <div class="line total"><span>Total</span><b data-cart-total>Rp 0</b></div>
      <a href="checkout.html" class="btn">Check Out</a>
    </aside>
  </div>
</div></section>
<div id="perks-slot"></div>
<div id="footer-slot"></div>
<script src="js/script.js"></script><script src="js/validation.js"></script><script src="js/auth.js"></script><script src="js/dashboard.js"></script></body></html>
