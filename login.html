<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Montserrat:wght@600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="css/style.css"/><link rel="stylesheet" href="css/responsive.css"/><title>Login — Furniro</title></head><body>
<div id="header-slot"></div>
<section class="auth"><div class="auth-card">
  <h1>Welcome back</h1><p class="hint">Log in to your Furniro account</p>
  <form id="loginForm" novalidate>
    <div class="field"><label>Email address</label><input name="email" type="email" placeholder="you@example.com" required/></div>
    <div class="field"><label>Password</label><div class="pass-wrap"><input name="password" type="password" placeholder="••••••••" required/><button type="button" data-toggle-pass class="toggle" aria-label="Show password">👁</button></div></div>
    <div class="row"><label style="display:flex;gap:8px;align-items:center"><input name="remember" type="checkbox"/> Remember me</label><a href="forgot-password.html" class="link">Forgot password?</a></div>
    <button class="btn" type="submit">Log In</button>
    <div class="alt">No account? <a href="signup.html" class="link">Create one</a></div>
  </form>
</div></section>
<script src="js/script.js"></script><script src="js/validation.js"></script><script src="js/auth.js"></script><script src="js/dashboard.js"></script></body></html>
