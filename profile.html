<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Montserrat:wght@600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="css/style.css"/><link rel="stylesheet" href="css/responsive.css"/><title>Profile — Furniro</title></head><body>
<div id="header-slot"></div>
<div class="dash" data-dash>
  <aside class="sidebar">
    <div class="u">
      <div class="avatar" data-user-initial>A</div>
      <div class="name" data-user-name>User</div>
      <div class="mail" data-user-mail>user@mail.com</div>
    </div>
    <nav>
      <a href="dashboard.html" class="">🏠 Dashboard</a>
      <a href="profile.html" class="active">👤 Profile</a>
      <a href="settings.html" class="">⚙ Settings</a>
      <a href="cart.html">🛒 My Cart</a>
      <a href="#" data-logout>↪ Logout</a>
    </nav>
  </aside>
  <main class="dash-main">
  <div class="dash-top"><h1>Profile</h1></div>
  <div class="card">
    <h3>Edit profile</h3>
    <form id="profileForm" novalidate>
      <div class="form-grid">
        <div class="field"><label>Full name</label><input name="name" type="text" required/></div>
        <div class="field"><label>Email</label><input name="email" type="email" required/></div>
      </div>
      <button class="btn" type="submit" style="margin-top:16px">Save changes</button>
    </form>
  </div>
  <div class="card">
    <h3>Change password</h3>
    <form id="passForm" novalidate>
      <div class="form-grid">
        <div class="field"><label>Current password</label><div class="pass-wrap"><input name="current" type="password" required/><button type="button" data-toggle-pass class="toggle">👁</button></div></div>
        <div class="field"><label>New password</label><div class="pass-wrap"><input name="password" type="password" required/><button type="button" data-toggle-pass class="toggle">👁</button></div></div>
        <div class="field full"><label>Confirm</label><div class="pass-wrap"><input name="confirm" type="password" required/><button type="button" data-toggle-pass class="toggle">👁</button></div></div>
      </div>
      <button class="btn" type="submit" style="margin-top:16px">Update password</button>
    </form>
  </div>
  </main>
</div>
<script src="js/script.js"></script><script src="js/validation.js"></script><script src="js/auth.js"></script><script src="js/dashboard.js"></script></body></html>
