<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Montserrat:wght@600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="css/style.css"/><link rel="stylesheet" href="css/responsive.css"/><title>Shop — Furniro</title><meta name="description" content="Browse all Furniro furniture products."/></head><body>
<div id="header-slot"></div>
<section class="banner"><div class="inner">
  <svg class="logo-mark" viewBox="0 0 32 22" fill="currentColor"><path d="M20.7 6.68L16 15.09l-4.7-8.41L16 0l4.7 6.68z"/></svg>
  <h1>Shop</h1>
  <div class="crumb"><a href="index.html">Home</a><span class="sep">></span><span>Shop</span></div>
</div></section>
<section class="toolbar"><div class="container">
  <div class="left">
    <span>⚙ Filter</span><span>▦</span><span>≡</span>
    <div class="divider"></div>
    <span data-count>Showing 1–16 of 0</span>
  </div>
  <div class="right">
    <input type="search" data-search placeholder="Search products…" style="min-width:200px"/>
    <select data-cat>
      <option value="all">All categories</option>
      <option value="chair">Chairs</option>
      <option value="sofa">Sofas</option>
      <option value="table">Tables</option>
      <option value="bed">Beds</option>
      <option value="lamp">Lamps</option>
      <option value="decor">Decor</option>
    </select>
    <span>Show</span><input type="number" data-per value="16" min="4" max="32"/>
    <span>Short by</span>
    <select data-sort>
      <option value="default">Default</option>
      <option value="name">Name</option>
      <option value="price-asc">Price ↑</option>
      <option value="price-desc">Price ↓</option>
    </select>
  </div>
</div></section>
<section class="section"><div class="container">
  <div class="product-grid" data-shop-grid></div>
  <div class="pagination" data-pagination></div>
</div></section>
<div id="perks-slot"></div>
<div id="footer-slot"></div>
<script src="js/script.js"></script><script src="js/validation.js"></script><script src="js/auth.js"></script><script src="js/dashboard.js"></script></body></html>
